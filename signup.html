<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up — RestWing</title>
  <link rel="stylesheet" href="page.css">
</head>

<body>

<header class="navbar">
    <div class="nav-brand">RestWing</div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="aboutus.html">About Us</a>
        <a href="login.html">Login</a>
        <a href="signup.html" class="nav-cta">Sign Up</a>
        <a href="buynow.html" class="nav-cta">Buy Now</a>
      </nav>
</header>

<section class="features-section">

  <p class="eyebrow center">Create Account</p>
  <h2 class="section-title center">Sign Up</h2>

  <div class="features-grid">

    <div class="feature-card" style="max-width:400px; width:100%;">

      <input id="signup-email" type="email" placeholder="Email"
        style="width:100%; margin-bottom:12px; padding:12px; border-radius:10px; border:1px solid #e5e5e5;">

      <input id="signup-password" type="password" placeholder="Password"
        style="width:100%; margin-bottom:20px; padding:12px; border-radius:10px; border:1px solid #e5e5e5;">

      <button onclick="signup()" class="btn-dark" style="width:100%;">
        Create Account
      </button>

      <p id="signup-error" style="color:#c0392b; margin-top:10px; display:none;">
        Error creating account
      </p>

    </div>

  </div>

</section>

<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.signup = async function () {
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value.trim();
  const errorEl = document.getElementById("signup-error");

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    // store user in firestore
    await setDoc(doc(db, "users", userCred.user.uid), {
      email,
      role: "user"
    });

    window.location.href = "index.html";

  } catch (err) {
    errorEl.style.display = "block";
  }
};
</script>

</body>
</html>
